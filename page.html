<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Table Order</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f4f5f7;
            --surface: #ffffff;
            --border: #e8eaed;
            --text-primary: #1a1d23;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --blue: #2563eb;
            --blue-light: #eff6ff;
            --blue-mid: #dbeafe;
            --amber: #d97706;
            --amber-light: #fffbeb;
            --green: #059669;
            --pending-bg: #f0f4ff;
            --pending-text: #3b5bdb;
            --radius: 14px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .phone {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }

        /* STATUS BAR */
        .status-bar {
            background: var(--bg);
            padding: 12px 20px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-time {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'DM Mono', monospace;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-icons svg {
            color: var(--text-primary);
        }

        .battery {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .battery-body {
            width: 22px;
            height: 11px;
            border: 1.5px solid #e53e3e;
            border-radius: 2.5px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 1.5px;
        }

        .battery-fill {
            width: 20%;
            height: 100%;
            background: #e53e3e;
            border-radius: 1px;
        }

        .battery-tip {
            width: 2px;
            height: 5px;
            background: #e53e3e;
            border-radius: 0 1px 1px 0;
        }

        /* HEADER */
        .header {
            background: var(--bg);
            padding: 10px 20px 14px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .header-left {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            background: var(--surface);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: all 0.15s ease;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .back-btn:active {
            transform: scale(0.93);
            background: var(--border);
        }

        .header-title h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .header-sub {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 3px;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: #f59e0b;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.85);
            }
        }

        .header-sub span {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .status-badge {
            background: var(--amber-light);
            color: var(--amber);
            font-size: 11px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 8px;
            letter-spacing: 0.5px;
            border: 1px solid #fde68a;
            white-space: nowrap;
        }

        /* TABLE SWITCH */
        .table-switch-section {
            padding: 0 20px 6px;
        }

        .section-label {
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.15s;
        }

        .search-icon:active {
            background: var(--border);
        }

        .table-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .table-scroll::-webkit-scrollbar {
            display: none;
        }

        .table-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--surface);
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .table-btn:active {
            transform: scale(0.9);
        }

        .table-btn.active {
            background: var(--blue);
            border-color: var(--blue);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
        }

        /* DIVIDER */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 10px 0;
        }

        /* SCROLL CONTENT */
        .scroll-content {
            padding: 0 16px;
            overflow-y: auto;
            max-height: calc(100vh - 280px);
            scrollbar-width: none;
        }

        .scroll-content::-webkit-scrollbar {
            display: none;
        }

        /* ORDER CARD */
        .order-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 12px;
            border: 1.5px solid var(--border);
            animation: slideUp 0.3s ease both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .order-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .order-ref {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'DM Mono', monospace;
            letter-spacing: -0.5px;
        }

        .order-total-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
            text-align: right;
        }

        .order-total {
            font-size: 22px;
            font-weight: 700;
            color: var(--blue);
            font-family: 'DM Mono', monospace;
            text-align: right;
        }

        .order-card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .order-meta {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
            font-size: 11.5px;
            font-weight: 500;
        }

        .order-meta svg {
            flex-shrink: 0;
        }

        .order-seats {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
            font-size: 11.5px;
            font-weight: 500;
        }

        /* ORDER ITEMS */
        .section-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 4px 0 10px;
            letter-spacing: -0.2px;
        }

        /* ADD ITEMS BUTTON */
        .add-items-btn {
            background: var(--blue-light);
            border: 2px dashed #93c5fd;
            border-radius: var(--radius);
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.15s ease;
            animation: slideUp 0.3s ease 0.05s both;
        }

        .add-items-btn:active {
            background: var(--blue-mid);
            transform: scale(0.98);
        }

        .add-circle {
            width: 32px;
            height: 32px;
            background: var(--blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
            transition: transform 0.15s ease;
        }

        .add-items-btn:active .add-circle {
            transform: rotate(90deg);
        }

        .add-items-text {
            font-size: 13px;
            font-weight: 700;
            color: var(--blue);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ORDER ITEM ROW */
        .order-item {
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            transition: all 0.15s ease;
            animation: slideUp 0.3s ease both;
        }

        .order-item:nth-child(1) {
            animation-delay: 0.08s;
        }

        .order-item:nth-child(2) {
            animation-delay: 0.12s;
        }

        .order-item:nth-child(3) {
            animation-delay: 0.16s;
        }

        .order-item:nth-child(4) {
            animation-delay: 0.20s;
        }

        .order-item:active {
            background: #f9fafb;
            transform: scale(0.99);
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .item-qty {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            min-width: 22px;
        }

        .item-name {
            font-size: 14.5px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.1px;
        }

        .pending-badge {
            background: var(--pending-bg);
            color: var(--pending-text);
            font-size: 10px;
            font-weight: 700;
            padding: 4px 9px;
            border-radius: 6px;
            letter-spacing: 0.5px;
            border: 1px solid #c7d7fd;
        }

        /* BOTTOM BAR */
        .bottom-bar {
            position: sticky;
            bottom: 0;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
            padding: 12px 16px 28px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .update-btn {
            flex: 1;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.38);
            transition: all 0.15s ease;
            letter-spacing: -0.2px;
        }

        .update-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(37, 99, 235, 0.3);
        }

        .spin-icon {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .more-btn {
            width: 50px;
            height: 50px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .more-btn:active {
            background: var(--bg);
            transform: scale(0.93);
        }

        /* HOME INDICATOR */
        .home-indicator {
            display: flex;
            justify-content: center;
            padding-bottom: 8px;
        }

        .home-bar {
            width: 130px;
            height: 4px;
            background: var(--text-primary);
            border-radius: 2px;
            opacity: 0.18;
        }
    </style>
</head>

<body>

    <div class="phone">

        <!-- STATUS BAR -->
        <div class="status-bar">
            <span class="status-time">10:13</span>
            <div class="status-icons">
                <!-- Signal bars -->
                <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
                    <rect x="0" y="7" width="3" height="5" rx="0.8" fill="currentColor" />
                    <rect x="4.5" y="5" width="3" height="7" rx="0.8" fill="currentColor" />
                    <rect x="9" y="2.5" width="3" height="9.5" rx="0.8" fill="currentColor" />
                    <rect x="13.5" y="0" width="3" height="12" rx="0.8" fill="currentColor" />
                </svg>
                <!-- WiFi -->
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                    <path d="M8 9.5C8.83 9.5 9.5 10.17 9.5 11S8.83 12.5 8 12.5 6.5 11.83 6.5 11 7.17 9.5 8 9.5z"
                        fill="currentColor" />
                    <path d="M4.2 7.2C5.2 6.2 6.5 5.5 8 5.5s2.8.7 3.8 1.7" stroke="currentColor" stroke-width="1.4"
                        stroke-linecap="round" fill="none" />
                    <path d="M1.4 4.4C3.1 2.7 5.4 1.5 8 1.5s4.9 1.2 6.6 2.9" stroke="currentColor" stroke-width="1.4"
                        stroke-linecap="round" fill="none" />
                </svg>
                <!-- Battery -->
                <div class="battery">
                    <div class="battery-body">
                        <div class="battery-fill"></div>
                    </div>
                    <div class="battery-tip"></div>
                </div>
            </div>
        </div>

        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <div class="back-btn">
                    <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
                        <path d="M7 1L1 7L7 13" stroke="#1a1d23" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </div>
                <div class="header-title">
                    <h1>Table 1</h1>
                    <div class="header-sub">
                        <div class="dot"></div>
                        <span>Preparing · 4 Items</span>
                    </div>
                </div>
            </div>
            <div class="status-badge">IN PROGRESS</div>
        </div>

        <!-- TABLE SWITCH -->
        <div class="table-switch-section">
            <div class="section-label">
                SWITCH TABLE
                <div class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5" />
                        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                </div>
            </div>
            <div class="table-scroll">
                <button class="table-btn active">T1</button>
                <button class="table-btn">T2</button>
                <button class="table-btn">T3</button>
                <button class="table-btn">T4</button>
                <button class="table-btn">T5</button>
                <button class="table-btn">T6</button>
                <button class="table-btn">T7</button>
                <button class="table-btn">T8</button>
            </div>
        </div>

        <div class="divider"></div>

        <!-- SCROLL CONTENT -->
        <div class="scroll-content">

            <!-- ORDER REFERENCE CARD -->
            <div class="order-card">
                <div class="order-card-top">
                    <div>
                        <div class="order-label">Order Reference</div>
                        <div class="order-ref">X4V11G</div>
                    </div>
                    <div>
                        <div class="order-total-label">Total</div>
                        <div class="order-total">$0.00</div>
                    </div>
                </div>
                <div class="order-card-bottom">
                    <div class="order-meta">
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                            <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2" />
                            <path d="M6 3.5V6L7.5 7.5" stroke="currentColor" stroke-width="1.2"
                                stroke-linecap="round" />
                        </svg>
                        2026-03-19T09:12:04.544Z
                    </div>
                    <div class="order-seats">
                        <svg width="13" height="12" viewBox="0 0 13 12" fill="none">
                            <circle cx="6.5" cy="3.5" r="2.5" stroke="currentColor" stroke-width="1.2" />
                            <path d="M1.5 11C1.5 8.51 3.76 6.5 6.5 6.5S11.5 8.51 11.5 11" stroke="currentColor"
                                stroke-width="1.2" stroke-linecap="round" />
                        </svg>
                        1 Seats
                    </div>
                </div>
            </div>

            <!-- ORDER ITEMS HEADER -->
            <div class="section-title">Order Items</div>

            <!-- ADD ITEMS -->
            <div class="add-items-btn">
                <div class="add-circle">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M7 2V12M2 7H12" stroke="white" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </div>
                <span class="add-items-text">Add Items</span>
            </div>

            <!-- ITEM ROWS -->
            <div class="order-item">
                <div class="item-left">
                    <span class="item-qty">1×</span>
                    <span class="item-name">Chocolate Cake</span>
                </div>
                <span class="pending-badge">PENDING</span>
            </div>

            <div class="order-item">
                <div class="item-left">
                    <span class="item-qty">1×</span>
                    <span class="item-name">Chocolate Truffle</span>
                </div>
                <span class="pending-badge">PENDING</span>
            </div>

            <div class="order-item">
                <div class="item-left">
                    <span class="item-qty">1×</span>
                    <span class="item-name">Sprite</span>
                </div>
                <span class="pending-badge">PENDING</span>
            </div>

            <div class="order-item">
                <div class="item-left">
                    <span class="item-qty">1×</span>
                    <span class="item-name">Mineral Water</span>
                </div>
                <span class="pending-badge">PENDING</span>
            </div>

            <div style="height:20px"></div>
        </div>

        <!-- BOTTOM BAR -->
        <div class="bottom-bar">
            <button class="update-btn">
                <svg class="spin-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M9 2C5.13 2 2 5.13 2 9" stroke="white" stroke-width="2" stroke-linecap="round" />
                    <path d="M9 16C12.87 16 16 12.87 16 9" stroke="white" stroke-width="2" stroke-linecap="round" />
                    <path d="M6.5 2.5L9 2L7.5 4.5" stroke="white" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                Update Status
            </button>
            <button class="more-btn">
                <svg width="18" height="5" viewBox="0 0 18 5" fill="none">
                    <circle cx="2.5" cy="2.5" r="2" fill="currentColor" />
                    <circle cx="9" cy="2.5" r="2" fill="currentColor" />
                    <circle cx="15.5" cy="2.5" r="2" fill="currentColor" />
                </svg>
            </button>
        </div>

        <!-- HOME INDICATOR -->
        <div class="home-indicator">
            <div class="home-bar"></div>
        </div>

    </div>

    <script>
        // Table button switching
        document.querySelectorAll('.table-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Update button feedback
        document.querySelector('.update-btn').addEventListener('click', function () {
            const original = this.innerHTML;
            this.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9L7 13L15 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Updated!`;
            this.style.background = '#059669';
            this.style.boxShadow = '0 6px 20px rgba(5,150,105,0.38)';
            setTimeout(() => {
                this.innerHTML = original;
                this.style.background = '';
                this.style.boxShadow = '';
            }, 1500);
        });
    </script>

</body>

</html>
